name: Fetch Meta Ads Data

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC (8am Brussels time)
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch ads from Meta API
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          echo "🚀 Starting Meta Ads fetch..."
          python fetch_ads.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 Auto-update ads data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
