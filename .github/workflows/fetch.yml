name: Fetch Meta Ads Data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch ads from Meta API
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          echo "Starting Meta Ads fetch..."
          python fetch_ads.py

      - name: Commit & push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git pull --rebase origin main
          git commit -m "Auto-update ads data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
